<h1>MLB Adjusted Leaderboard</h1>
<title>MLB Adjusted Leaderboard</title>
<script src="script.js"></script>
<head>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico?">
</head>
<body onload="getAvgData(new Date().getFullYear())"></body>
<div class="season-input">
  <input type="text" id="seasonInput" placeholder="Enter Season"></input>
  <button onclick="processInput()">Go</button>
</div>
<div class="avg-era-tabs">
  <button class="avg-tab" id="avgTab" onclick="getAvgData(new Date().getFullYear())">AVG</button>
  <button class="era-tab" id="eraTab" onclick="getERAData(new Date().getFullYear())">ERA</button>
</div>
<div class="league-tabs">
  <button class="mlb-tab" id="mlbTab" onclick="switchToMLB()">MLB</button>
  <button class="nl-tab" id="nlTab" onclick="switchToNL()">NL</button>
  <button class="al-tab" id="alTab" onclick="switchToAL()">AL</button>
</div>
<input type="checkbox" onchange="changeQualifiedPlayerRule()" checked>Color non-qualified players in red</input>
<ol class="player-ranks" id="playerRanks">
  <li class="players" id="rank1"></li>
  <li class="players" id="rank2"></li>
  <li class="players" id="rank3"></li>
  <li class="players" id="rank4"></li>
  <li class="players" id="rank5"></li>
  <li class="players" id="rank6"></li>
  <li class="players" id="rank7"></li>
  <li class="players" id="rank8"></li>
  <li class="players" id="rank9"></li>
  <li class="players" id="rank10"></li>
  <li class="players" id="rank11"></li>
  <li class="players" id="rank12"></li>
  <li class="players" id="rank13"></li>
  <li class="players" id="rank14"></li>
  <li class="players" id="rank15"></li>
  <li class="players" id="rank16"></li>
  <li class="players" id="rank17"></li>
  <li class="players" id="rank18"></li>
  <li class="players" id="rank19"></li>
  <li class="players" id="rank20"></li>
</ol>
